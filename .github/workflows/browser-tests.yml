name: Firefox WASM browser tests
on: workflow_call

jobs:
  browser-tests:
    name: Firefox WASM unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Build extension
        run: docker buildx build -f Dockerfile.browser-test --progress=plain .

