name: Build CLI
on: [push, pull_request]

jobs:
  tests:
    uses: ./.github/workflows/tests.yml
  build-cli:
    name: CLI build
    needs:
      - tests
    strategy:
      matrix:
        platform:
          - name: Linux X86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_ext: ""
            use_cross: false

          - name: Linux ARM64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary_ext: ""
            use_cross: true

          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_ext: ".exe"
            use_cross: false

    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.platform.target }}

      - name: Install cross-compilation tool
        if: matrix.platform.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.platform.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI tool (native)
        if: ${{ !matrix.platform.use_cross }}
        run: cargo build --bin luct --bin luct-node --release --locked --target ${{ matrix.platform.target }}

      - name: Build CLI tool (cross)
        if: matrix.platform.use_cross
        run: cross build --bin luct --bin luct-node --release --locked --target ${{ matrix.platform.target }}

      - name: Upload CLI tool
        uses: actions/upload-artifact@v7
        with:
          name: luct-cli(${{ matrix.platform.target }})
          path: target/${{ matrix.platform.target }}/release/luct${{ matrix.platform.binary_ext }}

      - name: Upload node
        uses: actions/upload-artifact@v7
        with:
          name: luct-node(${{ matrix.platform.target }})
          path: target/${{ matrix.platform.target }}/release/luct-node${{ matrix.platform.binary_ext }}


