name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
    build-cli:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout source code
            uses: actions/checkout@v3
          - name: Setup Rust toolchain
            uses: dtolnay/rust-toolchain@master
            with:
                toolchain: 1.91.1
                targets: x86_64-unknown-linux-gnu
          - name: Build CLI tool
            run: cargo build --bin luct --release --target x86_64-unknown-linux-gnu
          - name: Upload CLI tool
            uses: actions/upload-artifact@v4
            with:
                name: luct
                path: target/x86_64-unknown-linux-gnu/release/luct