name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
    build-cli:
        name: CLI build
        strategy: 
            matrix:
                platform:
                  - name: Linux X86-64
                    os: ubuntu-latest
                    target: x86_64-unknown-linux-musl
                    binary_ext: ""
                    use_cross: false

                  - name: Linux ARM64
                    os: ubuntu-latest
                    target: aarch64-unknown-linux-musl
                    binary_ext: ""
                    use_cross: true

        runs-on: ${{ matrix.platform.os }}
        steps:
          - name: Checkout source code
            uses: actions/checkout@v3

          - name: Setup Rust toolchain
            uses: dtolnay/rust-toolchain@master
            with:
                toolchain: 1.92.0
                targets: ${{ matrix.platform.target }}
            
          - name: Install cross-compilation tool
            if: matrix.platform.use_cross
            run: cargo install cross --git https://github.com/cross-rs/cross

          - name: Build CLI tool (native)
            if: ${{ !matrix.platform.use_cross }}
            run: cargo build --bin luct --release --target ${{ matrix.platform.target }}

          - name: Build CLI tool (cross)
            if: matrix.platform.use_cross
            run: cross build --bin luct --release --target ${{ matrix.platform.target }}

          - name: Upload CLI tool
            uses: actions/upload-artifact@v4
            with:
                name: luct
                path: target/${{ matrix.platform.target }}/release/luct